# Netlify config — deploys the static site at the repo root.
# No build step: it's plain HTML/CSS/JS.

[build]
  publish = "."

# Assets are NOT content-hashed (stable filenames), so they must NOT be cached
# "immutable" — that served a stale styles.css after edits. Always revalidate;
# ETags keep this cheap (repeat visits get 304s).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
